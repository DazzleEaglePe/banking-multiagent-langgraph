name: MLOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx  # Required for FastAPI TestClient

    - name: Run Syntax and Compilation Checks
      run: |
        python -m py_compile app.py main.py graph_builder.py config.py tools.py state.py

    - name: Run API Health & Graph Integration Test
      env:
        GEMINI_API_KEY: "AIzaSyDummyKeyForTestingPurposesOnly"
      run: |
        python test_api.py
